name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check code formatting and linting
      run: npm run lint

    - name: Run unit tests
      run: npm run test

    - name: Type checking and Build verification
      run: npm run build

    - name: Run basic security audit
      run: npm audit --audit-level=high