backend:
  name: github
  repo: shamil2/manivelle
  branch: main

media_folder: public/images/uploads
public_folder: /images/uploads

slug:
  encoding: "ascii"
  clean_accents: true

display_url: https://manivelle.com

collections:
  - name: "events"
    label: "Events / Workshops"
    folder: "content/events"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "End Date", name: "endDate", widget: "datetime", required: false }
      - { label: "Location", name: "location", widget: "string", required: false }
      - { label: "Price", name: "price", widget: "number", required: false }
      - { label: "Description", name: "description", widget: "markdown" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }

  - name: "gallery"
    label: "Gallery Images"
    folder: "content/gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Caption", name: "caption", widget: "string", required: false }
      - { label: "Alt Text", name: "alt", widget: "string", required: false }

  - name: "products"
    label: "Shop Products"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Price", name: "price", widget: "number" }
      - { label: "Images", name: "images", widget: "image", allow_multiple: true }
      - { label: "In Stock", name: "inStock", widget: "boolean", default: true }

  - name: "posts"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "publishedAt", widget: "datetime" }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: false }
      - { label: "Cover Image", name: "coverImage", widget: "image", required: false }
      - { label: "Content", name: "body", widget: "markdown" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }

  - name: "pages"
    label: "Pages"
    folder: "content/pages"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Page Name", name: "pageName", widget: "string", required: false, hint: "Internal name (e.g., 'home', 'about')" }
      - { label: "Hero Title", name: "heroTitle", widget: "string", required: false, hint: "Main headline" }
      - { label: "Hero Subtitle", name: "heroSubtitle", widget: "text", required: false, hint: "Secondary headline (supports multiple lines)" }
      - { label: "Hero Description", name: "heroDescription", widget: "text", required: false, hint: "Body text in hero section" }
      - { label: "Hero CTA Text", name: "heroCtaText", widget: "string", required: false, hint: "Button text" }
      - { label: "Hero CTA Link", name: "heroCtaLink", widget: "string", required: false, hint: "Button link (e.g., /shop)" }
      - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
      - label: "Gallery Items"
        name: "galleryItems"
        widget: "list"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Image", name: "image", widget: "image" }
          - { label: "Caption", name: "caption", widget: "string", required: false }
          - { label: "Location", name: "location", widget: "string", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }

  - name: "workshops"
    label: "Workshops"
    folder: "content/workshops"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Time", name: "time", widget: "string", hint: "e.g., '3 Heures', '5 Jours'" }
      - { label: "Price", name: "price", widget: "string", hint: "e.g., '€45'" }
      - { label: "Description", name: "description", widget: "text" }
      - label: "Features"
        name: "features"
        widget: "list"
        field: { label: "Feature", name: "feature", widget: "string" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }